<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9階休憩室 利用状況</title>
<style>
  :root{
    --bg-base:#191b21; --bg-panel:#232530; --bg-panel-raised:#2b2e3a; --seam:#121317;
    --amber:#e8b64f; --amber-dim:#8a6e33;
    --free:#5fbf8c; --free-bg:rgba(95,191,140,0.13);
    --busy:#e2725b; --busy-bg:rgba(226,114,91,0.14);
    --ink:#eef0f5; --ink-faint:#6b7183;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    color:var(--ink); background:var(--bg-base); min-height:100vh;
    padding:32px 16px 56px; -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .wrap{max-width:460px;margin:0 auto;}
  .eyebrow{text-align:center;font-size:11px;letter-spacing:0.22em;color:var(--amber-dim);text-transform:uppercase;margin-bottom:6px;}
  .title{text-align:center;font-size:22px;font-weight:700;margin:0 0 2px;}
  .sub{text-align:center;font-size:12.5px;color:var(--ink-faint);margin:0 0 26px;}

  .board{background:var(--bg-panel);border-radius:14px;overflow:hidden;box-shadow:0 12px 30px -14px rgba(0,0,0,0.6);}
  .row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--seam);cursor:pointer;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:var(--bg-panel-raised);}
  .letter{font-weight:700;font-size:26px;color:var(--amber);background:var(--seam);width:46px;height:46px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .row-mid{flex:1;min-width:0;}
  .room-name{font-size:14.5px;font-weight:500;}
  .updated{font-size:11px;color:var(--ink-faint);margin-top:2px;}
  .pill{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:999px;flex-shrink:0;}
  .pill.free{background:var(--free-bg);color:var(--free);}
  .pill.busy{background:var(--busy-bg);color:var(--busy);}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

  .links{display:flex;justify-content:center;gap:18px;margin-top:18px;font-size:12.5px;color:var(--ink-faint);}
  .links button{text-decoration:underline;text-underline-offset:3px;color:var(--ink-faint);}
  .links button:hover{color:var(--ink);}
  .footer-time{text-align:center;font-size:11px;color:var(--ink-faint);margin-top:22px;}

  /* room detail */
  .detail{text-align:center;padding-top:8px;}
  .detail-letter{
    font-weight:700;font-size:88px;line-height:1;color:var(--amber);
    background:var(--bg-panel);width:170px;height:170px;border-radius:20px;
    display:flex;align-items:center;justify-content:center;margin:14px auto 20px;
    box-shadow:0 16px 34px -16px rgba(0,0,0,0.65);
  }
  .detail-pill{display:inline-flex;align-items:center;gap:8px;font-size:14.5px;font-weight:600;padding:9px 20px;border-radius:999px;margin-bottom:28px;}
  .detail-pill.free{background:var(--free-bg);color:var(--free);}
  .detail-pill.busy{background:var(--busy-bg);color:var(--busy);}
  .toggle-btn{width:100%;max-width:270px;padding:17px;font-size:16px;font-weight:700;border-radius:14px;transition:transform 0.15s;}
  .toggle-btn:active{transform:scale(0.97);}
  .toggle-btn.to-busy{background:var(--busy);color:#251310;}
  .toggle-btn.to-free{background:var(--free);color:#0f2117;}
  .toggle-btn:disabled{opacity:0.55;}
  .msg{font-size:12.5px;color:var(--free);margin-top:16px;height:16px;}
  .detail-updated{font-size:11.5px;color:var(--ink-faint);margin-top:6px;}
  .back{display:inline-block;margin-top:30px;font-size:12.5px;text-decoration:underline;text-underline-offset:3px;color:var(--ink-faint);}
  .loading{text-align:center;padding:60px 20px;color:var(--ink-faint);font-size:13px;}
  .error{text-align:center;padding:40px 20px;color:var(--busy);font-size:13px;line-height:2;}
</style>
</head>
<body>
<div id="app"><div class="loading">読み込み中...</div></div>

<script>
const ROOM_IDS = ['A','B','C','D'];

function formatDate(iso){
  if(!iso) return '未使用';
  return new Date(iso).toLocaleString('ja-JP', {
    timeZone:'Asia/Tokyo', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
}

function getRoute(){
  const hash = location.hash.replace('#','');
  const params = new URLSearchParams(hash);
  const room = params.get('room');
  if (room && ROOM_IDS.includes(room)) return { page:'room', room };
  return { page:'status' };
}

async function fetchStatus(){
  const res = await fetch('/api/status');
  if (!res.ok) throw new Error('status fetch failed');
  const data = await res.json();
  return data.rooms;
}

async function fetchToggle(room){
  const res = await fetch('/api/toggle?room=' + encodeURIComponent(room));
  if (!res.ok) throw new Error('toggle failed');
  return await res.json();
}

async function toggleRoom(id){
  const btn = document.getElementById('toggle-btn');
  if (btn) btn.disabled = true;
  try{
    await fetchToggle(id);
    await renderRoom(id, true);
    setTimeout(() => renderRoom(id, false), 1500);
  }catch(e){
    alert('更新に失敗しました。もう一度お試しください。');
    if (btn) btn.disabled = false;
  }
}

async function renderStatus(){
  const app = document.getElementById('app');
  try{
    const rooms = await fetchStatus();
    app.innerHTML = `
      <div class="wrap">
        <div class="eyebrow">9F ・ BREAK ROOM STATUS</div>
        <div class="title">休憩室 利用状況</div>
        <div class="sub">タップして状況を切り替え</div>
        <div class="board">
          ${rooms.map(r => {
            const isUsing = r.status === 'using';
            return `
              <div class="row" onclick="toggleRoom('${r.id}')">
                <div class="letter">${r.id}</div>
                <div class="row-mid">
                  <div class="room-name">部屋 ${r.id}</div>
                  <div class="updated">更新: ${formatDate(r.updatedAt)}</div>
                </div>
                <div class="pill ${isUsing ? 'busy' : 'free'}">
                  <div class="dot"></div>${isUsing ? '利用中' : '空き'}
                </div>
              </div>
            `;
          }).join('')}
        </div>
        <div class="links"><button onclick="renderStatus()">更新する</button></div>
        <div class="footer-time">表示: ${formatDate(new Date().toISOString())}</div>
      </div>
    `;
  }catch(e){
    app.innerHTML = `<div class="error">データの取得に失敗しました。<br><button onclick="renderStatus()">再試行</button></div>`;
  }
}

async function renderRoom(roomId, msgOn){
  const app = document.getElementById('app');
  try{
    const rooms = await fetchStatus();
    const room = rooms.find(r => r.id === roomId);
    if (!room){
      app.innerHTML = `<div class="error">部屋が見つかりません<br><a class="back" href="#status">一覧に戻る</a></div>`;
      return;
    }
    const isUsing = room.status === 'using';
    app.innerHTML = `
      <div class="wrap detail">
        <div class="eyebrow">9F ・ 休憩室</div>
        <div class="detail-letter">${room.id}</div>
        <div class="detail-pill ${isUsing ? 'busy' : 'free'}">
          <div class="dot"></div>${isUsing ? '利用中' : '空き'}
        </div>
        <div>
          <button id="toggle-btn" class="toggle-btn ${isUsing ? 'to-free' : 'to-busy'}" onclick="toggleRoom('${room.id}')">
            ${isUsing ? '利用終了にする' : '利用開始にする'}
          </button>
        </div>
        <div class="msg">${msgOn ? '更新しました' : ''}</div>
        <div class="detail-updated">更新: ${formatDate(room.updatedAt)}</div>
        <div><a class="back" href="#status">一覧に戻る</a></div>
      </div>
    `;
  }catch(e){
    app.innerHTML = `<div class="error">データの取得に失敗しました。<br><a class="back" href="#status">戻る</a></div>`;
  }
}

async function render(){
  const route = getRoute();
  if (route.page === 'room') await renderRoom(route.room, false);
  else await renderStatus();
}

window.addEventListener('hashchange', render);
render();

setInterval(() => { if (getRoute().page === 'status') renderStatus(); }, 15000);
</script>
</body>
</html>
